<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trambüs Giydirme | RAN Ajans & Reklam Hizmetleri</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#070a14;
--text:#eaf0ff;
--brand:#17c7ff;
--brand2:#7a5cff;
}

*{box-sizing:border-box}
body{
margin:0;
font-family:Inter,sans-serif;
background:#070a14;
color:var(--text);
}

.container{width:min(1180px,calc(100% - 48px));margin:0 auto;}

.hero{
position:relative;
min-height:60vh;
display:flex;
align-items:flex-end;
padding:60px 0 40px;
overflow:hidden;
}

.hero .bg{
position:absolute;inset:0;
background:url("img/trambus.jpg") center/cover no-repeat;
filter:blur(14px) brightness(.8);
transform:scale(1.15);
}

.hero .overlay{
position:absolute;inset:0;
background:linear-gradient(180deg,rgba(7,10,20,.6),rgba(7,10,20,.95));
}

.hero .content{
position:relative;
z-index:2;
max-width:820px;
animation:fadeUp .8s ease forwards;
opacity:0;
}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
from{opacity:0;transform:translateY(20px);}
}

.hero-gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-bottom:20px;
}

.gitem{
position:relative;
border-radius:18px;
overflow:hidden;
cursor:pointer;
box-shadow:0 20px 60px rgba(0,0,0,.5);
transition:.3s ease;
}

.gitem img{
width:100%;
height:100%;
object-fit:cover;
display:block;
transition:.4s ease;
}

.gitem::after{
content:"+";
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:800;
color:white;
background:rgba(0,0,0,.0);
transition:.3s ease;
}

.gitem:hover{
transform:translateY(-4px);
box-shadow:0 0 0 2px rgba(23,199,255,.6),
0 30px 80px rgba(23,199,255,.25);
}

.gitem:hover img{transform:scale(1.1);}
.gitem:hover::after{background:rgba(0,0,0,.35);}

h1{
margin:14px 0 8px;
font-size:48px;
}

.lead{
color:rgba(234,240,255,.75);
line-height:1.6;
}

.stats{
margin-top:40px;
display:flex;
gap:30px;
flex-wrap:wrap;
}

.stat{
background:rgba(255,255,255,.05);
padding:14px 18px;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
font-weight:600;
}

@media(max-width:900px){
.hero-gallery{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
.hero-gallery{grid-template-columns:1fr;}
h1{font-size:34px;}
}
</style>
</head>

<body>

<section class="hero">
<div class="bg"></div>
<div class="overlay"></div>

<div class="container content">

<div class="hero-gallery">
<div class="gitem"><img src="img/imgtr1.jpg"></div>
<div class="gitem"><img src="img/imgtr2.jpg"></div>
<div class="gitem"><img src="img/imgtr3.jpg"></div>
</div>

<h1>Trambüs Giydirme</h1>
<p class="lead">Şehir içi sürekli dolaşım ile yüksek görünürlük. Tasarım, uygulama ve kampanya takibini tek yerden yürütün.</p>

<div class="stats">
<div class="stat">15+ Aktif Araç</div>
<div class="stat">30+ Kampanya</div>
<div class="stat">100.000+ Günlük Görünürlük</div>
</div>

</div>
</section>

</body>
</html>
